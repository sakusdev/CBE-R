name: Standalone binaries

on:
  push:
    branches:
      - main
      - "agent/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-standalone:
    name: Build standalone executables
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build standalone binaries
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p release
          bun build src/cli.ts --compile --target=bun-linux-x64-baseline --outfile release/cbe-r-linux-x64
          bun build src/cli.ts --compile --target=bun-linux-arm64 --outfile release/cbe-r-linux-arm64
          bun build src/cli.ts --compile --target=bun-windows-x64 --outfile release/cbe-r-windows-x64.exe
          bun build src/cli.ts --compile --target=bun-darwin-x64 --outfile release/cbe-r-macos-x64
          bun build src/cli.ts --compile --target=bun-darwin-arm64 --outfile release/cbe-r-macos-arm64

      - name: Smoke-test Linux executable
        shell: bash
        run: |
          set -euxo pipefail
          chmod +x release/cbe-r-linux-x64
          set +e
          output="$(release/cbe-r-linux-x64 --help 2>&1)"
          status=$?
          set -e
          printf '%s\n' "$output"
          test "$status" -eq 2
          grep -q "Usage: cbe-r" <<<"$output"

      - name: Generate checksums
        shell: bash
        run: |
          cd release
          sha256sum * > SHA256SUMS.txt

      - name: Upload standalone binaries
        uses: actions/upload-artifact@v4
        with:
          name: cbe-r-standalone
          path: release/*
          if-no-files-found: error

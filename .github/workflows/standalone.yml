name: Standalone binaries

on:
  push:
    branches:
      - main
      - "agent/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-standalone:
    name: Build standalone executables
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build standalone binaries
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p release
          for entry in cli gui-cli; do
            name="cbe-r"
            if [ "$entry" = "gui-cli" ]; then name="cbe-r-gui"; fi
            bun build "src/$entry.ts" --compile --target=bun-linux-x64-baseline --outfile "release/$name-linux-x64"
            bun build "src/$entry.ts" --compile --target=bun-linux-arm64 --outfile "release/$name-linux-arm64"
            bun build "src/$entry.ts" --compile --target=bun-windows-x64 --outfile "release/$name-windows-x64.exe"
            bun build "src/$entry.ts" --compile --target=bun-darwin-x64 --outfile "release/$name-macos-x64"
            bun build "src/$entry.ts" --compile --target=bun-darwin-arm64 --outfile "release/$name-macos-arm64"
          done

      - name: Validate Linux executables
        shell: bash
        run: |
          set -euxo pipefail
          chmod +x release/cbe-r-linux-x64 release/cbe-r-gui-linux-x64
          for binary in release/cbe-r-linux-x64 release/cbe-r-gui-linux-x64; do
            test -x "$binary"
            test -s "$binary"
            file "$binary" | grep -q "ELF 64-bit"
          done
          release/cbe-r-gui-linux-x64 --help | grep -q "Usage: cbe-r-gui"

      - name: Generate and verify checksums
        shell: bash
        run: |
          cd release
          sha256sum * > SHA256SUMS.txt
          sha256sum --check SHA256SUMS.txt

      - name: Upload standalone binaries
        uses: actions/upload-artifact@v4
        with:
          name: cbe-r-standalone
          path: release/*
          if-no-files-found: error

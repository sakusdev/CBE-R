name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm install --ignore-scripts
      - run: npm run check
      - name: Build executables
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p release
          for entry in cli gui-cli; do
            name="cbe-r"
            if [ "$entry" = "gui-cli" ]; then name="cbe-r-gui"; fi
            bun build "src/$entry.ts" --compile --target=bun-linux-x64-baseline --outfile "release/$name-linux-x64"
            bun build "src/$entry.ts" --compile --target=bun-linux-arm64 --outfile "release/$name-linux-arm64"
            bun build "src/$entry.ts" --compile --target=bun-windows-x64 --outfile "release/$name-windows-x64.exe"
            bun build "src/$entry.ts" --compile --target=bun-darwin-x64 --outfile "release/$name-macos-x64"
            bun build "src/$entry.ts" --compile --target=bun-darwin-arm64 --outfile "release/$name-macos-arm64"
          done
          npm pack
          mv cbe-r-*.tgz release/
          cd release
          sha256sum * > SHA256SUMS.txt
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
